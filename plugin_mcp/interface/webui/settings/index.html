<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MCP servers</title>
  <style>
    :root {
      --ink-950:#0a0b10; --ink-900:#11131b; --ink-800:#1a1d28; --ink-700:#272b39;
      --ink-600:#3a3f50; --ink-500:#6b7280; --ink-400:#9ca3af; --ink-300:#c3c8d2;
      --ink-100:#e5e7eb; --ink-50:#f3f4f6;
      --luna-600:#6d5efc; --luna-500:#8b7bff;
      --green:#34d399; --yellow:#fbbf24; --red:#f87171;
    }
    * { box-sizing:border-box; }
    html,body { margin:0; padding:0; background:transparent; }
    body { font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
      color:var(--ink-50); padding:2rem; max-width:60rem; }
    h1 { font-size:1.05rem; font-weight:600; margin:0 0 .25rem; }
    .sub { color:var(--ink-400); font-size:.85rem; margin:0 0 1.25rem; line-height:1.45; }
    code { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; }
    .err { margin-bottom:1rem; font-size:.85rem; color:#fecaca; background:rgba(127,29,29,.3);
      border:1px solid rgba(153,27,27,.5); border-radius:.5rem; padding:.65rem .75rem; white-space:pre-wrap; }
    .toolbar { display:flex; justify-content:flex-end; margin-bottom:.75rem; }
    .card { background:rgba(17,19,27,.4); border:1px solid rgba(255,255,255,.06); border-radius:.75rem; overflow:hidden; }
    .empty,.muted { color:var(--ink-400); font-size:.85rem; }
    .empty { padding:2rem; text-align:center; }
    .srow { display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem; cursor:pointer; border-top:1px solid rgba(255,255,255,.05); }
    .srow:first-child { border-top:none; }
    .srow:hover { background:rgba(255,255,255,.04); }
    .srow.sel { background:rgba(109,94,252,.10); }
    .dot { width:.6rem; height:.6rem; border-radius:50%; flex:none; }
    .dot.green { background:var(--green); box-shadow:0 0 8px var(--green); }
    .dot.yellow { background:var(--yellow); }
    .dot.red { background:var(--red); }
    .dot.off { background:var(--ink-600); }
    .sname { min-width:0; flex:1; }
    .sname .nm { font-weight:500; font-size:.9rem; color:var(--ink-100); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .sname .cmd { display:block; font-size:.75rem; color:var(--ink-500); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tcount { font-size:.75rem; color:var(--ink-400); flex:none; }
    .toggle { position:relative; width:2.5rem; height:1.5rem; border-radius:1rem; border:none; cursor:pointer; flex:none; background:var(--ink-700); transition:background .15s; }
    .toggle.on { background:var(--luna-500); }
    .toggle .knob { position:absolute; top:.15rem; left:.15rem; width:1.2rem; height:1.2rem; border-radius:50%; background:#fff; transition:left .15s; }
    .toggle.on .knob { left:1.15rem; }
    .iconbtn { background:none; border:none; cursor:pointer; color:var(--ink-300); font-size:.95rem; padding:.35rem; }
    .iconbtn:hover { color:var(--ink-50); }
    .iconbtn.danger { color:var(--red); }
    .iconbtn:disabled { opacity:.35; cursor:default; }
    button.primary,button.ghost { display:inline-flex; align-items:center; gap:.4rem; border:none; border-radius:.5rem;
      font-size:.85rem; font-weight:500; padding:.55rem .9rem; cursor:pointer; color:#fff; transition:background .15s,opacity .15s; }
    button.primary { background:var(--luna-600); } button.primary:hover { background:var(--luna-500); }
    button.ghost { background:var(--ink-700); color:var(--ink-50); } button.ghost:hover { background:var(--ink-600); }
    button:disabled { opacity:.4; cursor:default; }
    .panel { margin-top:1rem; background:rgba(17,19,27,.4); border:1px solid rgba(255,255,255,.06); border-radius:.75rem; padding:1.25rem; }
    .panel h3 { margin:0 0 .85rem; font-size:1rem; font-weight:600; color:var(--ink-50); }
    label { display:block; font-size:.8rem; color:var(--ink-300); margin-bottom:.25rem; }
    input,textarea { width:100%; background:var(--ink-950); border:1px solid rgba(255,255,255,.1); border-radius:.4rem;
      padding:.5rem .65rem; color:var(--ink-50); font-size:.85rem; margin-bottom:.75rem; }
    input:focus,textarea:focus { outline:none; border-color:var(--luna-500); }
    textarea { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; resize:vertical; }
    .chk { display:flex; align-items:center; gap:.5rem; font-size:.85rem; color:var(--ink-200); margin-bottom:.75rem; }
    .chk input { width:auto; margin:0; }
    .ok { font-size:.85rem; color:#86efac; background:rgba(6,78,59,.3); border:1px solid rgba(6,95,70,.5); border-radius:.4rem; padding:.5rem .65rem; margin-bottom:.5rem; }
    .tools li { list-style:none; font-size:.85rem; margin-bottom:.6rem; }
    .tools { padding:0; margin:0; }
    .badge { font-size:.7rem; padding:.1rem .35rem; border-radius:.3rem; background:rgba(127,29,29,.4); border:1px solid rgba(185,28,28,.5); color:#fca5a5; margin-right:.4rem; }
    .tdesc { color:var(--ink-400); margin-top:.15rem; }
    .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; padding:1rem; z-index:50; }
    .modal { background:var(--ink-900); border:1px solid rgba(255,255,255,.1); border-radius:1rem; padding:1.5rem; width:100%; max-width:34rem; }
    .modal h3 { margin:0 0 1rem; font-size:1.15rem; font-weight:600; }
    .modal-actions { display:flex; justify-content:space-between; gap:.5rem; margin-top:1rem; }
    .spinner { width:1rem; height:1rem; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%;
      animation:spin .7s linear infinite; display:inline-block; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <h1>MCP servers</h1>
  <p class="sub">Connect Luna to any Model Context Protocol server. Disabled by default — flip the toggle to bring its tools online. For secrets, set an env value to <code>vault:&lt;name&gt;</code> instead of a raw key.</p>

  <div id="error" class="err" style="display:none"></div>

  <div class="toolbar"><button id="add-btn" class="primary" data-testid="mcp-add-server-btn">+ Add server</button></div>

  <div id="list" class="card"><div class="empty muted"><span class="spinner"></span> Loading…</div></div>

  <div id="detail"></div>

  <script src="./app.js"></script>
</body>
</html>
